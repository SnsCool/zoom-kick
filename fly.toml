# Fly.io 設定 - Zoom Moderation Bot
app = "zoom-kick"
primary_region = "nrt"  # 東京リージョン

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  PUPPETEER_HEADLESS = "true"
  MOCK_MODE = "false"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # Bot常駐のため停止しない
  auto_start_machines = true
  min_machines_running = 1     # 常に1台稼働

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/api/bot/status"
  timeout = "10s"

[[vm]]
  size = "shared-cpu-2x"  # Puppeteer用に2vCPU
  memory = "1gb"           # Chrome用に1GB RAM
