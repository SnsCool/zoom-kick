# fly.toml app configuration file generated for zoom-kick on 2026-02-21T12:00:26+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'zoom-kick'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  MOCK_MODE = 'false'
  NODE_ENV = 'production'
  PORT = '3000'
  PUPPETEER_HEADLESS = 'true'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/bot/status'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
